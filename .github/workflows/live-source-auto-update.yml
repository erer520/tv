name: 直播源自动检测更新
run-name: ${{ github.actor }} 正在执行直播源有效性检测
on:
  push:
    paths:
      - 'itvlist.txt'  # 仅当自有源文件修改时触发
  schedule:
    - cron: '0 13 * * *'  # 北京时间每天21点自动运行（UTC+8时区转换）
jobs:
  source-check:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v6

      - name: 安装Python依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: 执行直播源检测脚本
        run: |
          python new.py  # 调用项目核心检测脚本处理itvlist.txt

      - name: 提交更新结果
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add itvlist.m3u speed_results.txt  # 提交生成的可用源文件
          git commit -m "自动更新：$(date +'%Y-%m-%d %H:%M:%S') 清理失效直播源"
          git push
